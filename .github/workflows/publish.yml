# Tag-triggered npm publish via Trusted Publishing (OIDC).
# Pushing a tag matching v* runs this workflow, which verifies version sync
# across the git tag, package.json, and .claude-plugin/plugin.json, then
# publishes to npm with provenance attestation. No NPM_TOKEN secret required —
# the npmjs.com Trusted Publisher config authorises this exact workflow.
name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  # Manual reruns (e.g., re-publishing after a transient registry failure)
  workflow_dispatch:

permissions:
  # Required for OIDC token exchange with npm
  id-token: write
  # Required for actions/checkout
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # TEMP DEBUG — to be removed after Trusted Publishing flow is verified.
      # npm Trusted Publishing requires npm CLI >= 11.5.1. If the bundled npm
      # is older, we upgrade in place.
      - name: Ensure npm >= 11.5.1 (for Trusted Publishing)
        run: |
          NPM_VERSION=$(npm --version)
          echo "Bundled npm version: $NPM_VERSION"
          REQUIRED="11.5.1"
          if [ "$(printf '%s\n' "$REQUIRED" "$NPM_VERSION" | sort -V | head -n1)" != "$REQUIRED" ]; then
            echo "Upgrading npm to latest…"
            npm install -g npm@latest
            echo "New npm version: $(npm --version)"
          fi

      # TEMP DEBUG — dumps the OIDC claims that npm would receive so we can
      # diff them against the Trusted Publisher config. Remove once the
      # publish flow is verified working end-to-end.
      - name: Debug OIDC claims (audience=npm:registry.npmjs.org)
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('npm:registry.npmjs.org')
            const payload = JSON.parse(
              Buffer.from(token.split('.')[1], 'base64').toString()
            )
            // Don't print the full token — only the safe claim fields.
            const safe = {
              iss: payload.iss,
              aud: payload.aud,
              sub: payload.sub,
              repository: payload.repository,
              repository_owner: payload.repository_owner,
              workflow_ref: payload.workflow_ref,
              ref: payload.ref,
              event_name: payload.event_name,
              environment: payload.environment,
              job_workflow_ref: payload.job_workflow_ref,
            }
            core.info('OIDC claims sent to npm:')
            core.info(JSON.stringify(safe, null, 2))

      - name: Verify version sync (tag vs package.json vs plugin.json)
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          PLUGIN_VERSION=$(node -p "require('./.claude-plugin/plugin.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ] || [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::Version mismatch — tag=$TAG_VERSION, package.json=$PKG_VERSION, plugin.json=$PLUGIN_VERSION"
            exit 1
          fi
          echo "Version $TAG_VERSION verified across package.json, plugin.json, and git tag."

      - name: Validate tarball contents (files allowlist)
        run: npm pack --dry-run

      # --access public is harmless for unscoped packages and a defensive
      # default in case the name ever moves to a scoped form (@owner/name).
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
